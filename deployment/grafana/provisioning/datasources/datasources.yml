apiVersion: 1

datasources:
  - name: Postgres
    uid: medreg-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: auditor_ro
    secureJsonData:
      password: auditor_ro
    jsonData:
      database: medreg
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: true

  - name: Loki
    uid: medreg-loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true

# Minimal single-binary Loki for classroom demo.
# - Filesystem storage (no S3/GCS).
# - No auth.
# - Accepts very old samples (the demo data is dated March 2026; depending on
#   wall-clock time of the demo, entries may look "old" to Loki's default limits).

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: false
  reject_old_samples_max_age: 8760h          # 1 year (effectively off because of the line above)
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_query_series: 5000
  max_query_lookback: 0s                      # no upper bound — demo data is in 2026
  max_query_length: 0s                        # off — let students query the whole demo span
  max_entries_limit_per_query: 10000
  allow_structured_metadata: true

ruler:
  alertmanager_url: http://localhost:9093

analytics:
  reporting_enabled: false
